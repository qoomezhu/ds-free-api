[server]
host = "127.0.0.1"
port = 22217

# CORS 允许的 Origin 列表（默认 ["http://localhost:22217"]）
# cors_origins = ["http://localhost:22217"]

# API Key 和管理密码通过 Web 管理面板配置（http://127.0.0.1:22217/admin）
# [[api_keys]]
# key = "sk-test"
# description = "开发测试"

[ds_core]
# 账号池（[[ds_core.accounts]]）
# 邮箱登录示例
# [[ds_core.accounts]]
# email = "user1@example.com"
# mobile = ""
# area_code = ""
# password = "pass1"

# 中国手机号登录示例
# [[ds_core.accounts]]
# email = ""
# mobile = "13800138000"
# area_code = "+86"
# password = "pass2"

# 已验证通过的 User-Agent（Android 客户端模拟）
# user_agent = "DeepSeek/2.1.1 Android/35"

# API 基础地址（默认）
# api_base = "https://chat.deepseek.com/api/v0"

# WASM 文件完整 URL（PoW 计算所需，版本号会变动，建议手动更新）
# wasm_url = "https://fe-static.deepseek.com/chat/static/sha3_wasm_bg.7b9ca65ddd.wasm"

# X-Client-Version 请求头（用于 expert 模型等功能）
# client_version = "2.0.0"

# X-Client-Platform 请求头
# client_platform = "android"

# X-Client-Locale 请求头
# client_locale = "zh_CN"

# 代理配置（可选，绕过 CloudFront WAF 地区限制）
# 使用非美国地区的代理出口节点可避免 WAF Challenge
# [proxy]
# url = "http://127.0.0.1:7890"
# url = "socks5://127.0.0.1:7891"

# 支持的模型类型列表，默认值为 ["default", "expert", "vision"]
# model_types = ["default", "expert", "vision"]
# max_input_tokens = [1048576, 1048576, 1048576]
# max_output_tokens = [384000, 384000, 384000]
# input_character_limits = [2621440, 163840, 2621440]

# 模型别名（可选，按 index 对齐 model_types，默认无别名）
# model_aliases = []

# 工具调用标签配置
# 采用 per-tool XML 标签策略：每个工具使用独立标签 `<tool_name>{json}</tool_name>`，
# 标签名即工具名（从请求的 tools 定义中自动提取）。
# extra_tool_names 用于配置额外的可识别工具名（未在请求 tools 中定义，
# 但模型可能输出的工具标签名）。
# tool_call.extra_tool_names = ["custom_tool_a", "custom_tool_b"]

# Admin 配置（由管理面板自动管理，部署时无需手动填写）
# [admin]
# password_hash = ""
# jwt_secret = ""
# jwt_issued_at = 0
